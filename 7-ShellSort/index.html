<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Shell Sort Visualizer</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <div class="top">
    <div class="title">
      <div class="badge" data-i18n="badge">Algoritmus #7</div>
      <h1>Shell Sort</h1>
      <p data-i18n="subtitle">Vylepšený Insertion Sort pomocí vzdálenosti Gap</p>
    </div>

    <div class="controls">
      <div class="language-switcher">
        <button id="czBtn" class="lang-btn active">
          <img src="assets/cz.svg" alt="CZ">
        </button>

        <button id="enBtn" class="lang-btn">
          <img src="assets/gb.svg" alt="EN">
        </button>
      </div>

      <button class="start" id="startBtn" data-i18n="start">▶ Start</button>
      <button class="reset" id="resetBtn" data-i18n="reset">⟳ Reset</button>
      <button class="speed" id="slowBtn" data-i18n="slower">🐢 Pomaleji</button>
      <button class="speed" id="fastBtn" data-i18n="faster">⚡ Rychleji</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <span data-i18n="gap">Current Gap</span>
      <strong id="gapValue">-</strong>
    </div>

    <div class="stat">
      <span data-i18n="comparisons">Porovnání</span>
      <strong id="comparisonsCount">0</strong>
    </div>

    <div class="stat">
      <span data-i18n="moves">Přesuny</span>
      <strong id="movesCount">0</strong>
    </div>
  </div>

  <div class="gap-panel">
    <h3 data-i18n="gapTitle">🐚 Gap sekvence</h3>
    <div class="gap-list" id="gapList"></div>
  </div>

  <div class="visualization" id="visualization"></div>

  <div class="bottom">
    <div class="card">
      <h3 data-i18n="statusTitle">📌 Co se právě děje?</h3>
      <div class="status" id="statusText"></div>
    </div>

    <div class="card">
      <h3 data-i18n="explanationTitle">🧠 Jak Shell Sort funguje?</h3>
      <div class="description" id="descriptionText"></div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
